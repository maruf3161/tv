<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রো আইপিটিভি প্লেয়ার - ব্যাকগ্রাউন্ড সাপোর্ট</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #0a0a0c; color: #e2e8f0; overflow: hidden; }
        
        #main-player { width: 100%; height: 35vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.7); z-index: 10; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* ব্যাকগ্রাউন্ড প্লে বাটন */
        #pip-btn { position: absolute; bottom: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); color: #fff; border: 1px solid #e50914; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        #pip-btn:hover { background: #e50914; }

        #content-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #111115; }
        
        .filter-section { padding: 10px; background: #16161f; border-bottom: 1px solid #222230; display: flex; flex-direction: column; gap: 6px; }
        .filter-label { font-size: 11px; font-weight: bold; color: #e50914; text-transform: uppercase; letter-spacing: 1px; }
        .scroll-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 3px; scrollbar-width: none; }
        .scroll-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn { padding: 6px 14px; background: #222230; color: #cbd5e1; border: none; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; }
        .tab-btn.active { background: #e50914; color: white; font-weight: bold; }
        
        /* কাস্টম লিংক ইনপুট এরিয়া */
        .custom-input-box { display: flex; gap: 6px; margin-top: 5px; }
        .custom-input-box input { flex: 1; padding: 8px; background: #1d1d27; border: 1px solid #333; color: white; border-radius: 6px; font-size: 12px; outline: none; }
        .custom-input-box button { padding: 8px 12px; background: #22c55e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }

        #channel-list { flex: 1; overflow-y: auto; list-style: none; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; align-content: start; }
        
        .channel-card { background: #1a1a24; border: 1px solid #252535; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; height: 100px; }
        .channel-card:hover { background: #222232; border-color: #3b3b54; }
        .channel-card.active { border-color: #e50914; background: rgba(229, 9, 20, 0.1); }
        .channel-card img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 6px; border-radius: 4px; background: #0a0a0c; }
        .channel-title { font-size: 11px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        @media(min-width: 768px) {
            body { flex-direction: row; }
            #main-player { width: calc(100% - 360px); height: 100vh; }
            #content-panel { width: 360px; max-width: 360px; height: 100vh; border-left: 1px solid #222230; }
            #channel-list { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        }
    </style>
</head>
<body>

    <div id="main-player">
        <video id="video-player" controls autoplay playsinline></video>
        <button id="pip-btn"><i class="fa-solid fa-clone"></i> Background (PiP)</button>
    </div>

    <div id="content-panel">
        <div class="filter-section">
            <div class="filter-label"><i class="fa-solid fa-globe"></i> দেশ সিলেক্ট করুন</div>
            <div class="scroll-tabs" id="country-tabs">
                <button class="tab-btn active" onclick="changeCountry('bd')">🇧🇩 বাংলাদেশ</button>
                <button class="tab-btn" onclick="changeCountry('in')">🇮🇳 ইন্ডিয়া</button>
                <button class="tab-btn" onclick="changeCountry('global')">🌐 গ্লোবাল</button>
            </div>
            
            <div class="filter-label"><i class="fa-solid fa-layer-group"></i> ক্যাটাগরি</div>
            <div class="scroll-tabs" id="category-tabs">
                <button class="cat-btn tab-btn active" onclick="changeCategory('all')">সব চ্যানেল</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('sports')">⚽ Sports</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('news')">📰 News</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('movies')">🎬 Movies</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('music')">🎵 Music</button>
            </div>

            <div class="filter-label"><i class="fa-solid fa-link"></i> নিজের সংগ্রহ করা M3U লিঙ্ক যোগ করুন</div>
            <div class="custom-input-box">
                <input type="text" id="custom-m3u-url" placeholder="টেলিগ্রাম/ইন্টারনেটের M3U লিঙ্ক এখানে দিন...">
                <button onclick="loadCustomM3U()">লোড করুন</button>
            </div>
        </div>

        <ul id="channel-list">
            <li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;">
                <i class="fa-solid fa-spinner fa-spin fa-2xl" style="color: #e50914; margin-bottom: 15px;"></i>
                <p>লোডিং হচ্ছে...</p>
            </li>
        </ul>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const channelListGrid = document.getElementById('channel-list');
        const pipBtn = document.getElementById('pip-btn');
        let allChannels = [];
        let currentCountry = 'bd';
        let currentCategory = 'all';
        let hls = null;

        const sources = {
            bd: "https://iptv-org.github.io/iptv/countries/bd.m3u",
            in: "https://iptv-org.github.io/iptv/countries/in.m3u",
            global: "https://iptv-org.github.io/iptv/index.m3u"
        };

        window.addEventListener('DOMContentLoaded', () => {
            loadSourceData(sources.bd);
            
            // Picture-in-Picture বাটন লজিক (অন্য অ্যাপের ওপর ভাসমান উইন্ডো)
            pipBtn.addEventListener('click', async () => {
                try {
                    if (video !== document.pictureInPictureElement) {
                        await video.requestPictureInPicture();
                    } else {
                        await document.exitPictureInPicture();
                    }
                } catch (error) {
                    alert('আপনার ব্রাউজারে ব্যাকগ্রাউন্ড উইন্ডো ফিচারটি এই মুহূর্তে সাপোর্ট করছে না। Chrome ব্যবহার করুন।');
                }
            });
        });

        async function loadSourceData(url) {
            try {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;"><i class="fa-solid fa-spinner fa-spin fa-2xl" style="color: #e50914; margin-bottom: 15px;"></i><p>চ্যানেল লোড হচ্ছে...</p></li>`;
                
                let response;
                try {
                    response = await fetch(url);
                } catch(e) {
                    response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const json = await response.json();
                    if(json.contents) {
                        allChannels = parseM3U(json.contents);
                        filterAndRenderChannels();
                        return;
                    }
                }
                
                const text = await response.text();
                allChannels = parseM3U(text);
                filterAndRenderChannels();
            } catch (error) {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #ff4a4a;">লোড করা যায়নি। লিঙ্কটি চেক করুন।</li>`;
            }
        }

        // কাস্টম লিঙ্ক লোড করার ফাংশন
        function loadCustomM3U() {
            const customUrl = document.getElementById('custom-m3u-url').value.trim();
            if(customUrl) {
                // দেশের অ্যাক্টিভ বাটন রিমুভ
                document.querySelectorAll('#country-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
                loadSourceData(customUrl);
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    currentChannel.name = nameMatch ? nameMatch[1] : "লাইভ টিভি";
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : "";
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentChannel.category = groupMatch ? groupMatch[1].toLowerCase() : "other";
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {};
                }
            }
            return channels;
        }

        function filterAndRenderChannels() {
            channelListGrid.innerHTML = '';
            const filtered = allChannels.filter(ch => {
                if (currentCategory === 'all') return true;
                return ch.category.includes(currentCategory);
            });

            if (filtered.length === 0) {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">কোনো চ্যানেল পাওয়া যায়নি।</li>`;
                return;
            }

            filtered.forEach(channel => {
                const card = document.createElement('li');
                card.className = 'channel-card';
                const finalLogo = channel.logo ? channel.logo : "https://via.placeholder.com/40/1a1a24/ffffff?text=TV";
                card.innerHTML = `<img src="${finalLogo}" onerror="this.src='https://via.placeholder.com/40/1a1a24/e50914?text=TV'"><span class="channel-title">${channel.name}</span>`;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
                    card.classList.add('active');
                    playStream(channel.url);
                });
                channelListGrid.appendChild(card);
            });
        }

        function changeCountry(countryCode) {
            document.querySelectorAll('#country-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentCountry = countryCode;
            currentCategory = 'all';
            document.querySelectorAll('#category-tabs .cat-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('#category-tabs .cat-btn')[0].classList.add('active');
            loadSourceData(sources[countryCode]);
        }

        function changeCategory(categoryKey) {
            document.querySelectorAll('#category-tabs .cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentCategory = categoryKey;
            filterAndRenderChannels();
        }

        function playStream(streamUrl) {
            if (hls) { hls.destroy(); }
            const config = { maxBufferLength: 30, enableWorker: true, lowLatencyMode: true };

            if (Hls.isSupported()) {
                hls = new Hls(config);
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(() => {}); });
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => { video.play(); });
            }
        }
    </script>
</body>
</html>
