<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP IPTV Pro - TeleZo Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #0b0b12; color: #f1f5f9; overflow: hidden; }
        
        /* আল্ট্রা প্রিমিয়াম ভিডিও প্লেয়ার কন্টেইনার */
        #main-player { width: 100%; height: 35vh; background: #000; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.7); z-index: 10; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* ২য় ছবির মতো প্রিমিয়াম লোডার */
        #buffer-loader { position: absolute; display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: rgba(11, 11, 18, 0.6); z-index: 15; pointer-events: none; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(139, 92, 246, 0.15); border-left-color: #8b5cf6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        #loader-text { margin-top: 12px; font-size: 11px; color: #a78bfa; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* প্লেয়ার কন্ট্রোল ওভারলে বাটনসমূহ */
        .player-overlay-btn { position: absolute; background: rgba(26, 26, 38, 0.7); border: 1px solid rgba(255,255,255,0.08); color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; backdrop-filter: blur(8px); transition: all 0.2s ease; z-index: 16; }
        .player-overlay-btn:hover { background: #8b5cf6; border-color: #a78bfa; box-shadow: 0 0 12px rgba(139, 92, 246, 0.5); }
        
        /* স্ক্রিনশটের হুবহু লোকেশন অনুযায়ী বাটন প্লেসমেন্ট */
        #pip-btn { top: 12px; right: 62px; } /* ২য় ছবির নির্দিষ্ট আইকন লোকেশন */
        #settings-btn { top: 12px; right: 14px; }

        /* গিয়ার সেটিংস ড্রপডাউন */
        #quality-menu { position: absolute; top: 56px; right: 14px; background: rgba(20, 20, 31, 0.95); border: 1px solid #2d2d44; border-radius: 10px; padding: 6px 0; list-style: none; display: none; z-index: 25; box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(12px); min-width: 110px; }
        #quality-menu li { padding: 8px 16px; font-size: 12px; cursor: pointer; transition: 0.2s; text-align: left; font-weight: 500; color: #cbd5e1; }
        #quality-menu li:hover { background: #8b5cf6; color: #fff; }
        #quality-menu li.active { color: #8b5cf6; font-weight: bold; }
        #quality-menu li.active:hover { color: #fff; }

        /* মূল কন্টেন্ট প্যানেল */
        #content-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0f0f16; position: relative; }
        
        /* ফিল্টার সেকশন (মসৃণ অ্যানিমেশনসহ) */
        .filter-section { padding: 12px 14px; background: #131322; border-bottom: 1px solid #1f1f35; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); max-height: 400px; overflow: hidden; }
        .filter-section.collapsed { max-height: 0; padding: 0; border-bottom: none; }
        
        /* ইন্টারফেস অন/অফ করার প্রিমিয়াম অ্যারো বাটন (`^` / `∨`) */
        #collapse-toggle { width: 100%; background: #131322; border: none; border-bottom: 1px solid #1f1f35; color: #6d6d9c; padding: 4px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: 0.2s; flex-shrink: 0; z-index: 5; }
        #collapse-toggle:hover { color: #8b5cf6; background: #161629; }

        .filter-label { font-size: 10px; font-weight: 700; color: #8b5cf6; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
        .scroll-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
        .scroll-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn { padding: 6px 14px; background: #1c1c30; color: #94a3b8; border: 1px solid #272744; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; transition: 0.2s; }
        .tab-btn.active { background: #8b5cf6; color: white; border-color: #8b5cf6; font-weight: 600; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.25); }
        
        .search-container { position: relative; width: 100%; }
        .search-container input { width: 100%; padding: 10px 14px 10px 38px; background: #18182a; border: 1px solid #272744; color: white; border-radius: 10px; font-size: 12px; outline: none; transition: 0.2s; }
        .search-container input:focus { border-color: #8b5cf6; background: #1b1b32; }
        .search-container i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 13px; }

        .custom-link-box { display: flex; gap: 6px; }
        .custom-link-box input { flex: 1; padding: 8px 12px; background: #18182a; border: 1px solid #272744; color: white; border-radius: 8px; font-size: 11px; outline: none; }
        .custom-link-box button { padding: 8px 16px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* চ্যানেল লিস্ট গ্রিড এরিয়া */
        #channel-list-container { flex: 1; overflow-y: auto; padding: 12px; background: #0f0f16; }
        #channel-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; align-content: start; }
        
        .channel-card { background: #141424; border: 1px solid #1f1f35; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; height: 100px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .channel-card:hover { transform: translateY(-3px); background: #1a1a30; border-color: #3b3b5c; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        .channel-card.active { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.08); box-shadow: inset 0 0 10px rgba(139, 92, 246, 0.15); }
        .channel-card img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; border-radius: 6px; background: #0b0b12; border: 1px solid #22223a; }
        .channel-title { font-size: 11px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #cbd5e1; }

        @media(min-width: 768px) {
            body { flex-direction: row; }
            #main-player { width: calc(100% - 380px); height: 100vh; }
            #content-panel { width: 380px; max-width: 380px; height: 100vh; border-left: 1px solid #1f1f35; }
            #channel-list { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
            #collapse-toggle { display: none; }
        }
    </style>
</head>
<body>

    <div id="main-player">
        <video id="video-player" controls autoplay playsinline></video>
        
        <div id="buffer-loader">
            <div class="spinner"></div>
            <p id="loader-text">Connecting to TV stream...</p>
        </div>
        
        <button id="pip-btn" class="player-overlay-btn" title="Background Play (PiP)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="4" width="18" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
                <rect x="13" y="11" width="7" height="5" rx="1" fill="currentColor" stroke="currentColor" stroke-width="1"/>
            </svg>
        </button>
        
        <button id="settings-btn" class="player-overlay-btn" title="Video Quality"><i class="fa-solid fa-gear"></i></button>
        
        <ul id="quality-menu">
            <li class="active" onclick="changeQuality(-1, this)">Auto</li>
        </ul>
    </div>

    <div id="content-panel">
        <div class="filter-section" id="filter-area">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-bar" placeholder="Search channel lists..." oninput="searchChannels()">
            </div>

            <div class="filter-label"><i class="fa-solid fa-globe"></i> দেশ ও জোন</div>
            <div class="scroll-tabs" id="country-tabs">
                <button class="tab-btn active" onclick="changeCountry('bd')">🇧🇩 বাংলাদেশ</button>
                <button class="tab-btn" onclick="changeCountry('in')">🇮🇳 ইন্ডিয়া</button>
                <button class="tab-btn" onclick="changeCountry('pk')">🇵🇰 পাকিস্তান</button>
                <button class="tab-btn" onclick="changeCountry('us')">🇺🇸 USA VIP</button>
                <button class="tab-btn" onclick="changeCountry('uk')">🇬🇧 UK VIP</button>
            </div>
            
            <div class="filter-label"><i class="fa-solid fa-layer-group"></i> ক্যাটেগরি</div>
            <div class="scroll-tabs" id="category-tabs">
                <button class="cat-btn tab-btn active" onclick="changeCategory('all')">All Channels</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('sports')">⚽ VIP Sports</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('news')">📰 News</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('movies')">🎬 Premium Movies</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('music')">🎵 Music</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('animation')">🧸 Kids</button>
            </div>

            <div class="filter-label"><i class="fa-solid fa-link"></i> এক্সটার্নাল M3U লিঙ্ক</div>
            <div class="custom-link-box">
                <input type="text" id="custom-m3u-url" placeholder="পেইড/প্রিমিয়াম M3U লিংক এখানে টেস্ট করুন...">
                <button onclick="loadCustomM3U()">Load</button>
            </div>
        </div>

        <button id="collapse-toggle" onclick="toggleFilter()"><i class="fa-solid fa-chevron-up"></i></button>

        <div id="channel-list-container">
            <ul id="channel-list">
                <li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #6d6d9c;">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2xl" style="color: #8b5cf6; margin-bottom: 15px;"></i>
                    <p>Loading premium channel databases...</p>
                </li>
            </ul>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const channelListGrid = document.getElementById('channel-list');
        const searchBar = document.getElementById('search-bar');
        const pipBtn = document.getElementById('pip-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const qualityMenu = document.getElementById('quality-menu');
        const filterArea = document.getElementById('filter-area');
        const collapseToggle = document.getElementById('collapse-toggle');
        const bufferLoader = document.getElementById('buffer-loader');
        const loaderText = document.getElementById('loader-text');
        
        let allChannels = [];
        let currentCountry = 'bd';
        let currentCategory = 'all';
        let hls = null;
        let currentStreamUrl = '';
        let stallTimer = null;

        const sources = {
            bd: "https://iptv-org.github.io/iptv/countries/bd.m3u",
            in: "https://iptv-org.github.io/iptv/countries/in.m3u",
            pk: "https://iptv-org.github.io/iptv/countries/pk.m3u",
            us: "https://iptv-org.github.io/iptv/countries/us.m3u",
            uk: "https://iptv-org.github.io/iptv/countries/uk.m3u"
        };

        window.addEventListener('DOMContentLoaded', () => {
            loadSourceData(sources.bd);
            
            pipBtn.addEventListener('click', async () => {
                try {
                    if (video !== document.pictureInPictureElement) { await video.requestPictureInPicture(); } 
                    else { await document.exitPictureInPicture(); }
                } catch (e) { alert('ভিডিওটি চালু করে ট্রাই করুন।'); }
            });

            // ফরগ্রাউন্ডে ফিরে আসার সাথে সাথে অটো ফুলস্ক্রিন হওয়ার স্মার্ট লজিক
            video.addEventListener('leavepictureinpicture', () => {
                if (video.requestFullscreen) { video.requestFullscreen(); }
                else if (video.webkitRequestFullscreen) { video.webkitRequestFullscreen(); }
            });

            settingsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                qualityMenu.style.display = qualityMenu.style.display === 'block' ? 'none' : 'block';
            });

            document.addEventListener('click', () => { qualityMenu.style.display = 'none'; });

            // নেটওয়ার্ক ওয়াচার ইঞ্জিন
            window.addEventListener('online', () => {
                showLoader("Network recovered! Connecting...");
                if (currentStreamUrl) { setTimeout(() => { playStream(currentStreamUrl); }, 1000); }
            });
            window.addEventListener('offline', () => { showLoader("Network disconnected..."); });

            video.addEventListener('waiting', () => { showLoader("Connecting to TV stream..."); });
            video.addEventListener('playing', () => { hideLoader(); clearTimeout(stallTimer); });
        });

        function showLoader(text) {
            loaderText.textContent = text;
            bufferLoader.style.display = 'flex';
        }

        function hideLoader() { bufferLoader.style.display = 'none'; }

        // ^ এবং ∨ এর মাধ্যমে ইন্টারফেস স্মুথলি হাইড/শো করার প্রিমিয়াম মেকানিজম
        function toggleFilter() {
            filterArea.classList.toggle('collapsed');
            if(filterArea.classList.contains('collapsed')) {
                collapseToggle.innerHTML = `<i class="fa-solid fa-chevron-down"></i>`;
            } else {
                collapseToggle.innerHTML = `<i class="fa-solid fa-chevron-up"></i>`;
            }
        }

        async function loadSourceData(url) {
            try {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #6d6d9c;"><i class="fa-solid fa-circle-notch fa-spin fa-2xl" style="color: #8b5cf6; margin-bottom: 15px;"></i><p>Scraping source streams...</p></li>`;
                searchBar.value = '';
                
                let response;
                try { response = await fetch(url); } 
                catch(e) {
                    response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const json = await response.json();
                    if(json.contents) {
                        allChannels = parseM3U(json.contents);
                        filterAndRenderChannels();
                        return;
                    }
                }
                const text = await response.text();
                allChannels = parseM3U(text);
                filterAndRenderChannels();
            } catch (error) {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #ef4444;">Server error! Try again later.</li>`;
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    currentChannel.name = nameMatch ? nameMatch[1] : "Live TV";
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : "";
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentChannel.category = groupMatch ? groupMatch[1].toLowerCase() : "other";
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {};
                }
            }
            return channels;
        }

        function filterAndRenderChannels(searchQuery = '') {
            channelListGrid.innerHTML = '';
            const filtered = allChannels.filter(ch => {
                const matchesCategory = currentCategory === 'all' || ch.category.includes(currentCategory);
                const matchesSearch = ch.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #4b5563;">No channels found.</li>`;
                return;
            }

            filtered.forEach(channel => {
                const card = document.createElement('li');
                card.className = 'channel-card';
                const finalLogo = channel.logo ? channel.logo : "https://via.placeholder.com/44/141424/ffffff?text=📺";
                card.innerHTML = `<img src="${finalLogo}" onerror="this.src='https://via.placeholder.com/44/141424/8b5cf6?text=TV'"><span class="channel-title">${channel.name}</span>`;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
                    card.classList.add('active');
                    playStream(channel.url);
                });
                channelListGrid.appendChild(card);
            });
        }

        function searchChannels() { filterAndRenderChannels(searchBar.value); }

        function changeCountry(countryCode) {
            document.querySelectorAll('#country-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentCountry = countryCode;
            currentCategory = 'all';
            document.querySelectorAll('#category-tabs .cat-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('#category-tabs .cat-btn')[0].classList.add('active');
            loadSourceData(sources[countryCode]);
        }

        function changeCategory(categoryKey) {
            document.querySelectorAll('#category-tabs .cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentCategory = categoryKey;
            filterAndRenderChannels(searchBar.value);
        }

        function loadCustomM3U() {
            const customUrl = document.getElementById('custom-m3u-url').value.trim();
            if(customUrl) { loadSourceData(customUrl); }
        }

        // 🌟 এন্টি-বাফারিং এবং ফাস্ট ড্রপ রিকভারি কোর ইঞ্জিন
        function playStream(streamUrl) {
            currentStreamUrl = streamUrl;
            clearTimeout(stallTimer);
            if (hls) { hls.destroy(); }
            
            qualityMenu.innerHTML = `<li class="active" onclick="changeQuality(-1, this)">Auto</li>`;

            // লাইভ স্পোর্টসের জন্য লো-ল্যাটেন্সি সুপার অপ্টিমাইজড বাফার কনফিগারেশন
            const ultraLowLatencyConfig = {
                maxBufferLength: 15,       // ডাটা ফ্র্যাগমেন্ট সাইজ ছোট রাখা হয়েছে যাতে বাফারিং চক্রে না পড়ে
                maxMaxBufferLength: 30,
                enableWorker: true,        
                lowLatencyMode: true,
                backBufferLength: 30,
                liveSyncDuration: 2,       // লাইভ স্ট্রিমিংয়ের সাথে ২ সেকেন্ডের নিখুঁত রিয়েলটাইম সিঙ্ক
                liveMaxLatencyDuration: 6
            };

            if (Hls.isSupported()) {
                hls = new Hls(ultraLowLatencyConfig);
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    const levels = hls.levels;
                    levels.forEach((level, index) => {
                        const name = level.height ? level.height + 'p' : 'Quality ' + index;
                        const li = document.createElement('li');
                        li.textContent = name;
                        li.onclick = function() { changeQuality(index, li); };
                        qualityMenu.appendChild(li);
                    });
                    video.play().catch(() => {});
                    hideLoader();
                });
                
                //
