<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP IPTV Pro - Ultimate Hybrid Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #070709; color: #f1f5f9; overflow: hidden; }
        
        /* ভিডিও প্লেয়ার সেকশন */
        #main-player { width: 100%; height: 35vh; background: #000; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: 0 4px 25px rgba(0,0,0,0.8); z-index: 10; }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        /* ইউটিউব প্লেয়ার কন্টেইনার */
        #yt-player-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 12; background: #000; }
        #yt-player { width: 100%; height: 100%; border: none; }

        /* প্লেয়ার কন্ট্রোল বাটন (লাল থিম) */
        .player-overlay-btn { position: absolute; background: rgba(20, 20, 31, 0.75); color: #fff; border: 1px solid rgba(255,255,255,0.1); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; backdrop-filter: blur(4px); transition: 0.2s; z-index: 16; }
        .player-overlay-btn:hover { background: #e50914; border-color: #e50914; box-shadow: 0 0 10px rgba(229, 9, 20, 0.5); }
        
        #pip-btn { top: 12px; right: 58px; } 
        #settings-btn { top: 12px; right: 12px; }

        /* গিয়ার সেটিংস ড্রপডাউন */
        #quality-menu { position: absolute; top: 56px; right: 12px; background: rgba(20, 20, 31, 0.95); border: 1px solid #2d2d44; border-radius: 8px; padding: 6px 0; list-style: none; display: none; z-index: 25; box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(8px); min-width: 110px; }
        #quality-menu li { padding: 8px 16px; font-size: 12px; cursor: pointer; transition: 0.2s; text-align: left; font-weight: 500; color: #cbd5e1; }
        #quality-menu li:hover { background: #e50914; color: #fff; }
        #quality-menu li.active { color: #e50914; font-weight: bold; }
        #quality-menu li.active:hover { color: #fff; }

        /* মূল কন্টেন্ট প্যানেল */
        #content-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0f0f15; position: relative; }
        
        /* ফিল্টার সেকশন */
        .filter-section { padding: 10px 12px; background: #14141f; border-bottom: 1px solid #222235; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); max-height: 400px; overflow: hidden; }
        .filter-section.collapsed { max-height: 0; padding: 0; border-bottom: none; }
        
        /* ইন্টারফেস অন/অফ করার বাটন */
        #collapse-toggle { width: 100%; background: #14141f; border: none; border-bottom: 1px solid #222235; color: #64748b; padding: 6px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: 0.2s; flex-shrink: 0; z-index: 5; }
        #collapse-toggle:hover { color: #e50914; background: #171724; }

        .filter-label { font-size: 10px; font-weight: 700; color: #e50914; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
        .scroll-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
        .scroll-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn { padding: 6px 12px; background: #1e1e2f; color: #cbd5e1; border: 1px solid #2d2d44; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; transition: 0.2s; }
        .tab-btn.active { background: #e50914; color: white; border-color: #e50914; font-weight: bold; box-shadow: 0 3px 8px rgba(229, 9, 20, 0.3); }
        
        .search-container { position: relative; width: 100%; }
        .search-container input { width: 100%; padding: 8px 12px 8px 36px; background: #1a1a26; border: 1px solid #2d2d44; color: white; border-radius: 8px; font-size: 12px; outline: none; }
        .search-container input:focus { border-color: #e50914; }
        .search-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 13px; }

        .custom-link-box { display: flex; gap: 6px; }
        .custom-link-box input { flex: 1; padding: 6px 10px; background: #1a1a26; border: 1px solid #2d2d44; color: white; border-radius: 6px; font-size: 11px; outline: none; }
        .custom-link-box button { padding: 6px 12px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* চ্যানেল লিস্ট এরিয়া */
        #channel-list-container { flex: 1; overflow-y: auto; padding: 10px; background: #0f0f15; }
        #channel-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; align-content: start; }
        
        .channel-card { background: #161622; border: 1px solid #222235; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; height: 95px; transition: 0.2s; }
        .channel-card:hover { transform: translateY(-2px); background: #1d1d2f; border-color: #3b3b59; }
        .channel-card.active { border-color: #e50914; background: rgba(229, 9, 20, 0.12); }
        .channel-card img { width: 38px; height: 38px; object-fit: contain; margin-bottom: 6px; border-radius: 4px; background: #070709; border: 1px solid #252535; }
        .channel-title { font-size: 11px; font-weight: 600; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #e2e8f0; }

        @media(min-width: 768px) {
            body { flex-direction: row; }
            #main-player { width: calc(100% - 380px); height: 100vh; }
            #content-panel { width: 380px; max-width: 380px; height: 100vh; border-left: 1px solid #222235; }
            #channel-list { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; }
            #collapse-toggle { display: none; }
        }
    </style>
</head>
<body>

    <div id="main-player">
        <video id="video-player" controls autoplay playsinline></video>
        <div id="yt-player-container"></div>
        
        <button id="pip-btn" class="player-overlay-btn" title="Background Play (PiP)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="4" width="18" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
                <rect x="13" y="11" width="7" height="5" rx="1" fill="currentColor" stroke="currentColor" stroke-width="1"/>
            </svg>
        </button>
        
        <button id="settings-btn" class="player-overlay-btn" title="Video Quality"><i class="fa-solid fa-gear"></i></button>
        
        <ul id="quality-menu">
            <li class="active" onclick="changeQuality(-1, this)">Auto</li>
        </ul>
    </div>

    <div id="content-panel">
        <div class="filter-section" id="filter-area">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-bar" placeholder="চ্যানেলের নাম লিখে খুঁজুন (যেমন: T Sports)..." oninput="searchChannels()">
            </div>

            <div class="filter-label"><i class="fa-solid fa-globe"></i> দেশ ও ভিআইপি জোন</div>
            <div class="scroll-tabs" id="country-tabs">
                <button class="tab-btn active" onclick="changeCountry('bd', event)">🇧🇩 বাংলাদেশ</button>
                <button class="tab-btn" onclick="changeCountry('in', event)">🇮🇳 ইন্ডিয়া</button>
                <button class="tab-btn" onclick="changeCountry('pk', event)">🇵🇰 পাকিস্তান</button>
                <button class="tab-btn" onclick="changeCountry('us', event)">🇺🇸 USA VIP</button>
                <button class="tab-btn" onclick="changeCountry('uk', event)">🇬🇧 UK VIP</button>
            </div>
            
            <div class="filter-label"><i class="fa-solid fa-layer-group"></i> ক্যাটেগরি</div>
            <div class="scroll-tabs" id="category-tabs">
                <button class="cat-btn tab-btn active" onclick="changeCategory('all', event)">সব চ্যানেল</button>
                <button class="cat-btn tab-btn" style="color: #00ffaa; border-color: #00ffaa;" onclick="changeCategory('viplive', event)">🏆 VIP Live Sports</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('sports', event)">⚽ Sports</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('news', event)">📰 News</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('movies', event)">🎬 Movies</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('music', event)">🎵 Music</button>
            </div>

            <div class="filter-label"><i class="fa-solid fa-link"></i> এক্সটার্নাল M3U / ইউটিউব লিঙ্ক টেস্টিং</div>
            <div class="custom-link-box">
                <input type="text" id="custom-m3u-url" placeholder="M3U বা ইউটিউব ভিডিও/লাইভ লিঙ্ক এখানে দিন...">
                <button onclick="loadCustomM3U()">লোড</button>
            </div>
        </div>

        <button id="collapse-toggle" onclick="toggleFilter()"><i class="fa-solid fa-chevron-up"></i></button>

        <div id="channel-list-container">
            <ul id="channel-list">
                </ul>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const ytContainer = document.getElementById('yt-player-container');
        const channelListGrid = document.getElementById('channel-list');
        const searchBar = document.getElementById('search-bar');
        const pipBtn = document.getElementById('pip-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const qualityMenu = document.getElementById('quality-menu');
        const filterArea = document.getElementById('filter-area');
        const collapseToggle = document.getElementById('collapse-toggle');
        
        let allChannels = [];
        let currentCountry = 'bd';
        let currentCategory = 'all';
        let hls = null;
        let currentStreamUrl = '';
        let stallTimer = null;

        // আপনার দেওয়া বিশেষ সচল লাইভ চ্যানেলগুলো ডিফল্টভাবে ইনজেক্ট করা হয়েছে
        const vipChannels = [
            { name: "beIN SPORTS XTRA", logo: "https://via.placeholder.com/44/161622/ffffff?text=beIN", category: "viplive", url: "https://bein-esp-xumo.amagi.tv/playlistR1080p.m3u8" },
            { name: "CazéTV Live (Brazil)", logo: "https://via.placeholder.com/44/161622/e50914?text=Caze", category: "viplive", url: "https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8" },
            { name: "Local Broadband IPTV", logo: "https://via.placeholder.com/44/161622/00ffaa?text=Local", category: "viplive", url: "http://103.59.176.72:8083/live1/tracks-v1a1/mono.m3u8?token=123" }
        ];

        const sources = {
            bd: "https://iptv-org.github.io/iptv/countries/bd.m3u",
            in: "https://iptv-org.github.io/iptv/countries/in.m3u",
            pk: "https://iptv-org.github.io/iptv/countries/pk.m3u",
            us: "https://iptv-org.github.io/iptv/countries/us.m3u",
            uk: "https://iptv-org.github.io/iptv/countries/uk.m3u"
        };

        window.addEventListener('DOMContentLoaded', () => {
            loadSourceData(sources.bd);
            
            pipBtn.addEventListener('click', async () => {
                if (ytContainer.style.display === 'block') {
                    alert('ইউটিউব মোডে Background (PiP) সিকিউরিটির কারণে ব্রাউজারে ব্লক থাকে।');
                    return;
                }
                try {
                    if (video !== document.pictureInPictureElement) { await video.requestPictureInPicture(); } 
                    else { await document.exitPictureInPicture(); }
                } catch (e) { alert('ভিডিও চালু করে ট্রাই করুন।'); }
            });

            settingsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (ytContainer.style.display === 'block') { alert('ইউটিউবের প্লেয়ারের ভেতর থেকে কোয়ালিটি কন্ট্রোল করুন।'); return; }
                qualityMenu.style.display = qualityMenu.style.display === 'block' ? 'none' : 'block';
            });

            document.addEventListener('click', () => { qualityMenu.style.display = 'none'; });

            window.addEventListener('online', () => {
                if (currentStreamUrl && ytContainer.style.display !== 'block') { setTimeout(() => { playStream(currentStreamUrl); }, 1000); }
            });
        });

        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|live\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function toggleFilter() {
            filterArea.classList.toggle('collapsed');
            if(filterArea.classList.contains('collapsed')) {
                collapseToggle.innerHTML = `<i class="fa-solid fa-chevron-down"></i>`;
            } else {
                collapseToggle.innerHTML = `<i class="fa-solid fa-chevron-up"></i>`;
            }
        }

        async function loadSourceData(url) {
            try {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;"><i class="fa-solid fa-circle-notch fa-spin fa-2xl" style="color: #e50914; margin-bottom: 15px;"></i><p>চ্যানেল স্ক্র্যাপ করা হচ্ছে...</p></li>`;
                searchBar.value = '';
                
                let response;
                try { response = await fetch(url); } 
                catch(e) {
                    response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const json = await response.json();
                    if(json.contents) {
                        const parsed = parseM3U(json.contents);
                        allChannels = [...vipChannels, ...parsed]; // VIP চ্যানেলগুলো মার্জ করা হলো
                        filterAndRenderChannels();
                        return;
                    }
                }
                const text = await response.text();
                const parsed = parseM3U(text);
                allChannels = [...vipChannels, ...parsed]; // VIP চ্যানেলগুলো মার্জ করা হলো
                filterAndRenderChannels();
            } catch (error) {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #ff4a4a;">সার্ভার জ্যাম! পরে চেষ্টা করুন।</li>`;
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    currentChannel.name = nameMatch ? nameMatch[1] : "লাইভ টিভি";
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : "";
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentChannel.category = groupMatch ? groupMatch[1].toLowerCase() : "other";
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {};
                }
            }
            return channels;
        }

        function filterAndRenderChannels(searchQuery = '') {
            channelListGrid.innerHTML = '';
            const filtered = allChannels.filter(ch => {
                const matchesCategory = currentCategory === 'all' || ch.category === currentCategory || (currentCategory === 'sports' && ch.category.includes('sports'));
                const matchesSearch = ch.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">কোনো চ্যানেল পাওয়া যায়নি।</li>`;
                return;
            }

            filtered.forEach(channel => {
                const card = document.createElement('li');
                card.className = 'channel-card';
                // যদি ভিআইপি চ্যানেল হয় তবে কার্ডে একটু বর্ডার গ্লো ইফেক্ট দেওয়া
                if (channel.category === 'viplive') {
                    card.style.border = '1px solid #00ffaa';
                }
                const finalLogo = channel.logo ? channel.logo : "https://via.placeholder.com/44/161622/ffffff?text=⭐";
                card.innerHTML = `<img src="${finalLogo}" onerror="this.src='https://via.placeholder.com/44/161622/e50914?text=LIVE'"><span class="channel-title">${channel.name}</span>`;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
                    card.classList.add('active');
                    playStream(channel.url);
                });
                channelListGrid.appendChild(card);
            });
        }

        function searchChannels() { filterAndRenderChannels(searchBar.value); }

        function changeCountry(countryCode, event) {
            document.querySelectorAll('#country-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentCountry = countryCode;
            currentCategory = 'all';
            document.querySelectorAll('#category-tabs .cat-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('#category-tabs .cat-btn')[0].classList.add('active');
            loadSourceData(sources[countryCode]);
        }

        function changeCategory(categoryKey, event) {
            document.querySelectorAll('#category-tabs .cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentCategory = categoryKey;
            filterAndRenderChannels(searchBar.value);
        }

        function loadCustomM3U() {
            const customUrl = document.getElementById('custom-m3u-url').value.trim();
            if(!customUrl) return;

            const ytId = getYouTubeId(customUrl);
            if(ytId) {
                if (hls) { hls.destroy(); hls = null; }
                video.pause();
                video.src = "";
                video.style.display = 'none';
                ytContainer.style.display = 'block';
                ytContainer.innerHTML = `<iframe id="yt-player" src="https://www.youtube.com/embed/${ytId}?autoplay=1&controls=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } else {
                ytContainer.innerHTML = "";
                ytContainer.style.display = 'none';
                video.style.display = 'block';
                loadSourceData(customUrl);
            }
        }

        function playStream(streamUrl) {
            currentStreamUrl = streamUrl;
            clearTimeout(stallTimer);
            
            ytContainer.innerHTML = "";
            ytContainer.style.display = 'none';
            video.style.display = 'block';

            if (hls) { hls.destroy(); hls = null; }
            video.src = "";
            qualityMenu.innerHTML = `<li class="active" onclick="changeQuality(-1, this)">Auto</li>`;

            const config = {
                maxBufferLength: 20,
                maxMaxBufferLength: 40,
                enableWorker: true,
                lowLatencyMode: true
            };

            if (Hls.isSupported()) {
                hls = new Hls(config);
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    const levels = hls.levels;
                    levels.forEach((level, index) => {
                        const name = level.height ? level.height + 'p' : 'Quality ' + index;
                        const li = document.createElement('li');
                        li.textContent = name;
                        li.onclick = function() { changeQuality(index, li); };
                        qualityMenu.appendChild(li);
                    });
                    video.play().catch(() => {});
                });
                
                hls.on(Hls.Events.FRAG_CHANGED, () => {
                    clearTimeout(stallTimer);
                    stallTimer = setTimeout(() => {
                        if(!video.paused && hls) { hls.startLoad(); }
                    }, 2000); 
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR && hls) { hls.startLoad(); } 
                        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR && hls) { hls.recoverMediaError(); }
                        else { setTimeout(() => { playStream(currentStreamUrl); }, 1500); }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => { video.play(); });
            }
        }

        function changeQuality(levelIndex, element) {
            if (hls) {
                hls.currentLevel = levelIndex;
                document.querySelectorAll('#quality-menu li').forEach(li => li.classList.remove('active'));
                element.classList.add('active');
            }
        }
    </script>
</body>
</html>
