<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Web IPTV Player - Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #070709; color: #f1f5f9; overflow: hidden; }
        
        /* ভিডিও প্লেয়ার স্ক্রিন */
        #main-player { width: 100%; height: 35vh; background: #000; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: 0 4px 25px rgba(0,0,0,0.8); z-index: 10; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #pip-btn { position: absolute; bottom: 12px; right: 12px; background: rgba(229, 9, 20, 0.85); color: #fff; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* ডানপাশের বা নিচের কন্ট্রোল প্যানেল */
        #content-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0f0f15; }
        
        .filter-section { padding: 12px; background: #14141f; border-bottom: 1px solid #222235; display: flex; flex-direction: column; gap: 8px; }
        .filter-label { font-size: 11px; font-weight: 700; color: #e50914; text-transform: uppercase; letter-spacing: 1.2px; display: flex; align-items: center; gap: 5px; }
        
        .scroll-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .scroll-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn { padding: 8px 16px; background: #1e1e2f; color: #cbd5e1; border: 1px solid #2d2d44; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; transition: 0.2s; }
        .tab-btn.active { background: #e50914; color: white; border-color: #e50914; font-weight: bold; box-shadow: 0 3px 12px rgba(229, 9, 20, 0.4); }
        
        /* অ্যাডভান্সড সার্চ বার */
        .search-container { position: relative; width: 100%; }
        .search-container input { width: 100%; padding: 10px 12px 10px 38px; background: #1a1a26; border: 1px solid #2d2d44; color: white; border-radius: 8px; font-size: 13px; outline: none; transition: 0.2s; }
        .search-container input:focus { border-color: #e50914; box-shadow: 0 0 8px rgba(229, 9, 20, 0.2); }
        .search-container i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 14px; }

        /* কাস্টম লিংক ইনপুট বক্স */
        .custom-link-box { display: flex; gap: 6px; }
        .custom-link-box input { flex: 1; padding: 9px 12px; background: #1a1a26; border: 1px solid #2d2d44; color: white; border-radius: 8px; font-size: 12px; outline: none; }
        .custom-link-box button { padding: 9px 14px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; }

        /* চ্যানেল গ্রিড ভিউ */
        #channel-list { flex: 1; overflow-y: auto; list-style: none; padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; align-content: start; }
        
        .channel-card { background: #161622; border: 1px solid #222235; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; height: 105px; transition: 0.2s; }
        .channel-card:hover { transform: translateY(-3px); background: #1d1d2f; border-color: #3b3b59; }
        .channel-card.active { border-color: #e50914; background: rgba(229, 9, 20, 0.12); box-shadow: 0 0 15px rgba(229, 9, 20, 0.2); }
        .channel-card img { width: 44px; height: 44px; object-fit: contain; margin-bottom: 8px; border-radius: 6px; background: #070709; border: 1px solid #252535; }
        .channel-title { font-size: 11px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; color: #e2e8f0; }

        /* ডেক্সটপ বা স্মার্ট টিভির জন্য লেআউট */
        @media(min-width: 768px) {
            body { flex-direction: row; }
            #main-player { width: calc(100% - 380px); height: 100vh; }
            #content-panel { width: 380px; max-width: 380px; height: 100vh; border-left: 1px solid #222235; }
            #channel-list { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; }
            .channel-card { height: 95px; padding: 8px; }
            .channel-card img { width: 38px; height: 38px; }
        }
    </style>
</head>
<body>

    <div id="main-player">
        <video id="video-player" controls autoplay playsinline></video>
        <button id="pip-btn"><i class="fa-solid fa-clone"></i> Background (PiP)</button>
    </div>

    <div id="content-panel">
        <div class="filter-section">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-bar" placeholder="চ্যানেলের নাম লিখে খুঁজুন (যেমন: T Sports)..." oninput="searchChannels()">
            </div>

            <div class="filter-label"><i class="fa-solid fa-globe"></i> দেশ ও ভিআইপি জোন</div>
            <div class="scroll-tabs" id="country-tabs">
                <button class="tab-btn active" onclick="changeCountry('bd')">🇧🇩 বাংলাদেশ</button>
                <button class="tab-btn" onclick="changeCountry('in')">🇮🇳 ইন্ডিয়া</button>
                <button class="tab-btn" onclick="changeCountry('pk')">🇵🇰 পাকিস্তান</button>
                <button class="tab-btn" onclick="changeCountry('us')">🇺🇸 USA VIP</button>
                <button class="tab-btn" onclick="changeCountry('uk')">🇬🇧 UK VIP</button>
            </div>
            
            <div class="filter-label"><i class="fa-solid fa-layer-group"></i> ক্যাটেগরি</div>
            <div class="scroll-tabs" id="category-tabs">
                <button class="cat-btn tab-btn active" onclick="changeCategory('all')">সব চ্যানেল</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('sports')">⚽ VIP Sports</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('news')">📰 News</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('movies')">🎬 Premium Movies</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('music')">🎵 Music</button>
                <button class="cat-btn tab-btn" onclick="changeCategory('animation')">🧸 Kids</button>
            </div>

            <div class="filter-label"><i class="fa-solid fa-link"></i> এক্সটার্নাল M3U লিঙ্ক টেস্টিং</div>
            <div class="custom-link-box">
                <input type="text" id="custom-m3u-url" placeholder="আপনার নিজের সংগ্রহ করা লিঙ্ক থাকলে এখানে দিন...">
                <button onclick="loadCustomM3U()">লোড</button>
            </div>
        </div>

        <ul id="channel-list">
            <li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;">
                <i class="fa-solid fa-circle-notch fa-spin fa-2xl" style="color: #e50914; margin-bottom: 15px;"></i>
                <p>ভিআইপি চ্যানেল ডাটাবেজ আপডেট হচ্ছে...</p>
            </li>
        </ul>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const channelListGrid = document.getElementById('channel-list');
        const searchBar = document.getElementById('search-bar');
        const pipBtn = document.getElementById('pip-btn');
        let allChannels = [];
        let currentCountry = 'bd';
        let currentCategory = 'all';
        let hls = null;

        // বিশ্বস্ত সচল আন্তর্জাতিক মাল্টি-সার্ভার গেটওয়ে
        const sources = {
            bd: "https://iptv-org.github.io/iptv/countries/bd.m3u",
            in: "https://iptv-org.github.io/iptv/countries/in.m3u",
            pk: "https://iptv-org.github.io/iptv/countries/pk.m3u",
            us: "https://iptv-org.github.io/iptv/countries/us.m3u",
            uk: "https://iptv-org.github.io/iptv/countries/uk.m3u"
        };

        window.addEventListener('DOMContentLoaded', () => {
            loadSourceData(sources.bd);
            
            pipBtn.addEventListener('click', async () => {
                try {
                    if (video !== document.pictureInPictureElement) { await video.requestPictureInPicture(); } 
                    else { await document.exitPictureInPicture(); }
                } catch (e) { alert('ভিডিওটি প্লে করে বাটনে ক্লিক করুন।'); }
            });
        });

        async function loadSourceData(url) {
            try {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;"><i class="fa-solid fa-circle-notch fa-spin fa-2xl" style="color: #e50914; margin-bottom: 15px;"></i><p>চ্যানেল স্ক্র্যাপ করা হচ্ছে...</p></li>`;
                searchBar.value = ''; // দেশ পরিবর্তন করলে সার্চ বক্স ক্লিয়ার হবে
                
                let response;
                try {
                    response = await fetch(url);
                } catch(e) {
                    // CORS বা বাফারিং ড্রপ রুটের জন্য হাই-স্পিড ফলব্যাক গেটওয়ে
                    response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const json = await response.json();
                    if(json.contents) {
                        allChannels = parseM3U(json.contents);
                        filterAndRenderChannels();
                        return;
                    }
                }
                
                const text = await response.text();
                allChannels = parseM3U(text);
                filterAndRenderChannels();
            } catch (error) {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #ff4a4a;">সার্ভার ওভারলোড! পরে আবার চেষ্টা করুন।</li>`;
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    currentChannel.name = nameMatch ? nameMatch[1] : "লাইভ টিভি";
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : "";
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentChannel.category = groupMatch ? groupMatch[1].toLowerCase() : "other";
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {};
                }
            }
            return channels;
        }

        function filterAndRenderChannels(searchQuery = '') {
            channelListGrid.innerHTML = '';
            
            const filtered = allChannels.filter(ch => {
                const matchesCategory = currentCategory === 'all' || ch.category.includes(currentCategory);
                const matchesSearch = ch.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                channelListGrid.innerHTML = `<li style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">কোনো চ্যানেল পাওয়া যায়নি।</li>`;
                return;
            }

            filtered.forEach(channel => {
                const card = document.createElement('li');
                card.className = 'channel-card';
                const finalLogo = channel.logo ? channel.logo : "https://via.placeholder.com/44/161622/ffffff?text=⭐";
                card.innerHTML = `<img src="${finalLogo}" onerror="this.src='https://via.placeholder.com/44/161622/e50914?text=LIVE'"><span class="channel-title">${channel.name}</span>`;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
                    card.classList.add('active');
                    playStream(channel.url);
                });
                channelListGrid.appendChild(card);
            });
        }

        // রিয়েল-টাইম সার্চ লজিক
        function searchChannels() {
            filterAndRenderChannels(searchBar.value);
        }

        function changeCountry(countryCode) {
            document.querySelectorAll('#country-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentCountry = countryCode;
            currentCategory = 'all';
            document.querySelectorAll('#category-tabs .cat-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('#category-tabs .cat-btn')[0].classList.add('active');
            loadSourceData(sources[countryCode]);
        }

        function changeCategory(categoryKey) {
            document.querySelectorAll('#category-tabs .cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentCategory = categoryKey;
            filterAndRenderChannels(searchBar.value);
        }

        function loadCustomM3U() {
            const customUrl = document.getElementById('custom-m3u-url').value.trim();
            if(customUrl) {
                document.querySelectorAll('#country-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
                loadSourceData(customUrl);
            }
        }

        // এন্টি-ল্যাগ ও হাই-স্পিড বাফারিং প্লেলিস্ট লজিক
        function playStream(streamUrl) {
            if (hls) { hls.destroy(); }
            
            // একই সাথে কোটি মানুষ দেখলে ক্র্যাশ এড়াতে প্লেয়ার বাফারিং প্রোটেকশন কনফিগ
            const antiLagConfig = {
                maxBufferLength: 60,       // খেলাধুলার সময় ল্যাগ কমাতে ১ মিনিট পর্যন্ত অ্যাডভান্স বাফার ধরে রাখবে
                maxMaxBufferLength: 120,
                enableWorker: true,        // ব্যাকগ্রাউন্ড থ্রেড প্রসেসিং অন (স্মুথ প্লেব্যাকের জন্য)
                lowLatencyMode: true,      // লাইভ স্ট্রিমিং লেটেন্সি ড্রপ করবে
                liveSyncDuration: 3,       // লাইভ ব্রডকাস্টের একদম ক্লোজ সিঙ্ক রাখবে
                liveMaxLatencyDuration: 10
            };

            if (Hls.isSupported()) {
                hls = new Hls(antiLagConfig);
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(() => {}); });
                
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { hls.startLoad(); } 
                        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { hls.recoverMediaError(); }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => { video.play(); });
            }
        }
    </script>
</body>
</html>
